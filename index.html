<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIcademy — Learn AI fundamentals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a6aff;
    --blue-dark:#0e4fd4;
    --navy:#0a1633;
    --surface:#f3f6fe;
    --border:#dde6f7;
    --gold:#f5b800;
    --gold-dark:#cf9a00;
    --green:#2bb673;
    --green-dark:#1f9159;
    --red:#e84e4e;
    --muted:#5b6a8c;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    background:#fff;
    color:var(--navy);
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- screens & animations ---------- */
  .screen{flex:1;padding:20px 20px 110px;animation:slideIn .32s cubic-bezier(.22,1,.36,1);}
  .screen.no-tabs{padding-bottom:32px;}
  @keyframes slideIn{from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:translateX(0);}}
  @keyframes popIn{0%{opacity:0;transform:scale(.86);}70%{transform:scale(1.04);}100%{opacity:1;transform:scale(1);}}
  @keyframes riseIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  .pop{animation:popIn .38s cubic-bezier(.22,1,.36,1) both;}
  .rise{animation:riseIn .4s cubic-bezier(.22,1,.36,1) both;}

  /* ---------- chunky cards & buttons ---------- */
  .card{
    background:#fff;
    border:2px solid var(--border);
    border-bottom-width:5px;
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .btn{
    display:block;width:100%;
    font-family:inherit;font-size:17px;font-weight:700;
    text-align:center;cursor:pointer;
    border-radius:16px;padding:15px 20px;
    border:2px solid transparent;border-bottom-width:5px;
    transition:transform .06s ease,border-bottom-width .06s ease,filter .15s ease;
    user-select:none;
  }
  .btn:active:not(:disabled){transform:translateY(3px);border-bottom-width:2px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-primary{background:var(--blue);border-color:var(--blue-dark);color:#fff;}
  .btn-primary:hover:not(:disabled){filter:brightness(1.06);}
  .btn-ghost{background:#fff;border-color:var(--border);color:var(--navy);}
  .btn-ghost:hover:not(:disabled){background:var(--surface);}
  .choice{
    display:block;width:100%;text-align:left;
    font-family:inherit;font-size:16px;font-weight:500;color:var(--navy);
    background:#fff;border:2px solid var(--border);border-bottom-width:5px;
    border-radius:16px;padding:15px 18px;margin-bottom:12px;cursor:pointer;
    transition:transform .06s ease,border-bottom-width .06s ease,background .15s,border-color .15s;
  }
  .choice:active{transform:translateY(3px);border-bottom-width:2px;}
  .choice:hover{background:var(--surface);}
  .choice.selected{background:#e8f0ff;border-color:var(--blue);color:var(--blue-dark);font-weight:700;}
  .choice.correct{background:#e6f8ef;border-color:var(--green);color:var(--green-dark);font-weight:700;}
  .choice.wrong{background:#fdecec;border-color:var(--red);color:var(--red);font-weight:700;}
  .choice:disabled{cursor:default;}
  .choice:disabled:active{transform:none;border-bottom-width:5px;}

  input[type=text]{
    width:100%;font-family:inherit;font-size:18px;font-weight:500;color:var(--navy);
    border:2px solid var(--border);border-bottom-width:5px;border-radius:16px;
    padding:15px 18px;outline:none;background:#fff;
  }
  input[type=text]:focus{border-color:var(--blue);}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;}
  .stat-chips{display:flex;gap:8px;}
  .chip{
    display:flex;align-items:center;gap:6px;
    background:var(--surface);border:2px solid var(--border);
    border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px;
  }
  .chip .ico{font-size:15px;}
  .back-link{
    background:none;border:none;cursor:pointer;font-family:inherit;
    font-size:15px;font-weight:700;color:var(--blue);padding:6px 0;
  }

  /* ---------- progress bars / rings ---------- */
  .pbar{height:14px;background:var(--surface);border-radius:999px;overflow:hidden;border:2px solid var(--border);flex:1;}
  .pbar > div{height:100%;background:var(--blue);border-radius:999px;transition:width .4s cubic-bezier(.22,1,.36,1);}
  .ring{transform:rotate(-90deg);}
  .ring circle{fill:none;stroke-width:6;}
  .ring .track{stroke:var(--border);}
  .ring .fill{stroke:var(--blue);stroke-linecap:round;transition:stroke-dashoffset .5s cubic-bezier(.22,1,.36,1);}
  .module-node.done .ring .fill{stroke:var(--gold);}

  /* ---------- module path ---------- */
  .path{position:relative;padding:8px 0 20px;}
  .path-section{position:relative;display:flex;justify-content:center;margin:6px 0 24px;}
  .path-section span{background:#fff;border:2px solid var(--border);border-radius:999px;padding:6px 16px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .path-line{position:absolute;left:50%;top:0;bottom:0;width:4px;background:var(--border);border-radius:2px;transform:translateX(-50%);}
  .module-node{position:relative;display:flex;justify-content:center;margin-bottom:26px;}
  .module-node.left .mcard{transform:translateX(-26px);}
  .module-node.right .mcard{transform:translateX(26px);}
  .mcard{
    position:relative;width:88%;max-width:380px;
    background:#fff;border:2px solid var(--border);border-bottom-width:6px;
    border-radius:var(--radius);padding:16px;cursor:pointer;
    display:flex;align-items:center;gap:14px;
    transition:transform .06s ease,border-bottom-width .06s ease,box-shadow .2s;
  }
  .mcard:hover{box-shadow:0 4px 18px rgba(26,106,255,.10);}
  .module-node.left .mcard:active{transform:translateX(-26px) translateY(4px);border-bottom-width:2px;}
  .module-node.right .mcard:active{transform:translateX(26px) translateY(4px);border-bottom-width:2px;}
  .mcard.locked{cursor:default;background:var(--surface);}
  .mcard.locked:hover{box-shadow:none;}
  .mcard.locked:active{border-bottom-width:6px;}
  .module-node.done .mcard{background:#fff9e6;border-color:var(--gold);}
  .ring-wrap{position:relative;width:58px;height:58px;flex:none;}
  .ring-wrap .emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .mcard h3{font-size:16px;font-weight:800;line-height:1.25;}
  .mcard p{font-size:13px;color:var(--muted);margin-top:2px;font-weight:500;}
  .badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;border-radius:999px;padding:3px 9px;margin:6px 4px 0 0;}
  .badge.lvl{background:#e6f8ef;color:var(--green-dark);border:1.5px solid #bfe5d0;}
  .bridge{margin-top:8px;font-size:12.5px;font-weight:700;color:var(--gold-dark);line-height:1.4;}
  .badge.start{background:var(--blue);color:#fff;}
  .badge.skip{background:#eef2fb;color:var(--muted);border:1.5px solid var(--border);}
  .badge.done{background:var(--gold);color:#fff;}
  .badge.locked{background:#e6e9f2;color:#9aa6c0;}
  .check-bub{
    position:absolute;top:-9px;right:-9px;width:28px;height:28px;border-radius:50%;
    background:var(--gold);border:2px solid var(--gold-dark);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;
  }
  .lock-ico{font-size:20px;color:#9aa6c0;}

  /* ---------- module detail ---------- */
  .item-row{
    display:flex;align-items:center;gap:14px;width:100%;
    background:#fff;border:2px solid var(--border);border-bottom-width:5px;
    border-radius:16px;padding:14px 16px;margin-bottom:12px;cursor:pointer;
    font-family:inherit;text-align:left;
    transition:transform .06s ease,border-bottom-width .06s ease;
  }
  .item-row:active{transform:translateY(3px);border-bottom-width:2px;}
  .item-row .ic{width:42px;height:42px;border-radius:12px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
  .item-row.complete .ic{background:#fff3cc;}
  .item-row h4{font-size:15px;font-weight:700;color:var(--navy);}
  .item-row p{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:1px;}
  .item-row .tick{margin-left:auto;color:var(--gold-dark);font-weight:800;font-size:18px;flex:none;}
  .item-row .xp-tag{margin-left:auto;font-size:12px;font-weight:800;color:var(--blue);background:#e8f0ff;border-radius:999px;padding:3px 9px;flex:none;}

  /* ---------- lesson ---------- */
  .lesson-body{font-size:16.5px;line-height:1.65;font-weight:400;}
  .lesson-body p{margin-bottom:14px;}
  .lesson-body strong{font-weight:700;}
  .analogy{
    background:var(--surface);border:2px solid var(--border);border-left:5px solid var(--blue);
    border-radius:14px;padding:14px 16px;margin:16px 0;font-size:15.5px;line-height:1.55;
  }
  .analogy .tag{display:block;font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:5px;}
  .lesson-head h2{font-size:22px;font-weight:800;margin-bottom:4px;}
  .lesson-head p{color:var(--muted);font-weight:500;font-size:14px;margin-bottom:16px;}
  .dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
  .dots span{width:34px;height:8px;border-radius:999px;background:var(--border);}
  .dots span.on{background:var(--blue);}

  /* ---------- quiz ---------- */
  .feedback{border-radius:14px;padding:13px 16px;font-weight:700;font-size:15px;margin:4px 0 14px;animation:popIn .3s both;}
  .feedback.good{background:#e6f8ef;color:var(--green-dark);border:2px solid var(--green);}
  .feedback.bad{background:#fdecec;color:var(--red);border:2px solid var(--red);}
  .xp-float{font-weight:800;color:var(--gold-dark);}

  /* ---------- celebration ---------- */
  .celebrate{text-align:center;padding:36px 10px;}
  .celebrate .big{font-size:62px;animation:popIn .5s both;}
  .celebrate h2{font-size:24px;font-weight:800;margin:12px 0 6px;}
  .celebrate p{color:var(--muted);font-weight:500;margin-bottom:22px;}

  /* ---------- glossary ---------- */
  .gl-term{margin-bottom:12px;}
  .gl-term h4{font-size:15.5px;font-weight:800;color:var(--blue-dark);margin-bottom:3px;}
  .gl-term p{font-size:14.5px;line-height:1.5;color:var(--navy);font-weight:400;}

  /* ---------- brief ---------- */
  .brief-card{margin-bottom:14px;width:100%;display:block;text-align:left;cursor:pointer;font-family:inherit;transition:transform .06s ease,border-bottom-width .06s ease,box-shadow .2s;}
  .brief-card:hover{box-shadow:0 4px 18px rgba(26,106,255,.10);}
  .brief-card:active{transform:translateY(3px);border-bottom-width:2px;}
  .brief-card .date{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .brief-card h4{font-size:16px;font-weight:800;line-height:1.35;margin-bottom:7px;color:var(--navy);}
  .brief-card p{font-size:14.5px;line-height:1.55;color:var(--muted);font-weight:500;}
  .tag-pill{display:inline-block;background:#e8f0ff;color:var(--blue-dark);font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px;margin:8px 6px 0 0;text-transform:uppercase;letter-spacing:.04em;}

  /* ---------- reader ---------- */
  .reader{max-width:680px;margin:0 auto;}
  .reader .meta{font-size:13px;font-weight:700;color:var(--muted);margin-top:12px;display:flex;align-items:center;flex-wrap:wrap;gap:2px;}
  .reader .meta .tag-pill{margin-top:0;}
  .reader h1{font-size:27px;font-weight:800;line-height:1.3;margin:12px 0 10px;}
  .reader .lede{font-size:17.5px;line-height:1.65;color:var(--muted);font-weight:500;margin-bottom:6px;}
  .reader h3{font-size:13.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);margin:28px 0 10px;}
  .reader p{font-size:16.5px;line-height:1.8;margin-bottom:14px;}

  /* ---------- coach ---------- */
  .chat{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .bubble{max-width:82%;padding:12px 15px;border-radius:16px;font-size:15px;line-height:1.5;font-weight:500;}
  .bubble.bot{background:var(--surface);border:2px solid var(--border);border-bottom-left-radius:6px;align-self:flex-start;}
  .bubble.user{background:var(--blue);color:#fff;border-bottom-right-radius:6px;align-self:flex-end;}
  .coach-input{display:flex;gap:8px;}
  .coach-input input{flex:1;opacity:.55;}
  .soon-banner{
    background:#fff3cc;border:2px solid var(--gold);border-radius:14px;
    padding:11px 15px;font-weight:700;font-size:14px;color:#7a5d00;
    text-align:center;margin-bottom:16px;
  }

  /* ---------- tab bar ---------- */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:#fff;border-top:2px solid var(--border);
    display:flex;justify-content:center;
  }
  .tabbar-inner{display:flex;width:100%;max-width:520px;}
  .tab{
    flex:1;background:none;border:none;cursor:pointer;font-family:inherit;
    padding:10px 4px max(10px, env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:11px;font-weight:700;color:var(--muted);
  }
  .tab .t-ico{font-size:21px;filter:grayscale(1);opacity:.55;transition:.15s;}
  .tab.active{color:var(--blue);}
  .tab.active .t-ico{filter:none;opacity:1;transform:scale(1.08);}

  /* ---------- onboarding ---------- */
  .ob-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px;max-width:440px;margin:0 auto;width:100%;}
  .ob-progress{display:flex;gap:6px;margin-bottom:30px;}
  .ob-progress span{flex:1;height:8px;border-radius:999px;background:var(--border);transition:background .3s;}
  .ob-progress span.on{background:var(--blue);}
  .ob-q{font-size:23px;font-weight:800;line-height:1.3;margin-bottom:6px;}
  .ob-sub{color:var(--muted);font-weight:500;font-size:15px;margin-bottom:22px;}
  .logo-line{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px;margin-bottom:26px;color:var(--blue);}
  .logo-line .mark{width:34px;height:34px;border-radius:10px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;}

  .section-title{font-size:19px;font-weight:800;margin:6px 0 14px;}
  .hello{font-size:24px;font-weight:800;line-height:1.25;margin-bottom:4px;}
  .hello-sub{color:var(--muted);font-weight:500;font-size:15px;margin-bottom:14px;}
  .spine-line{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:2px solid var(--border);border-radius:999px;padding:7px 14px;font-size:13.5px;font-weight:600;margin-bottom:20px;}
  .muted{color:var(--muted);}

  @media (max-width:420px){
    .module-node.left .mcard{transform:translateX(-12px);}
    .module-node.right .mcard{transform:translateX(12px);}
    .module-node.left .mcard:active{transform:translateX(-12px) translateY(4px);}
    .module-node.right .mcard:active{transform:translateX(12px) translateY(4px);}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   DAILY BRIEF — edit this array by hand to update the Daily Brief tab.
   Each item: { date, headline, tldr, tags: [..], article: {
     what_happened, why_it_matters, how_to_use, our_take } }
   The Brief tab lists cards (date, headline, tldr, tags); tapping one
   opens the full article in a reader view.
   ===================================================================== */
const NEWS = [
  {
    date: "2026-06-10",
    headline: "Major labs ship cheaper 'small' models tuned for everyday tasks",
    tldr: "Routine AI work — summaries, drafts, classification — now costs a fraction of last year's price, which quietly changes what's worth automating.",
    tags: ["Models", "Costs"],
    article: {
      what_happened: "Over the past few weeks, each of the major labs released compact versions of their flagship models, priced at a small fraction of the frontier tier per million tokens. They're tuned for the everyday middle of AI work: summarizing, classifying, extracting, drafting. On routine tasks, independent testers report them performing close to last year's flagships — at prices that round to pennies per thousand requests.",
      why_it_matters: "Cost per task is the number that decides whether an AI feature ships (Module 6). When the price of a summary drops tenfold, automation ideas that were marginal — triaging every inquiry, summarizing every call, classifying every form — suddenly clear the bar. It also makes model routing the default architecture: cheap model for the easy 80%, frontier model for the hard 20%.",
      how_to_use: "Pull out an automation idea you shelved because it felt expensive, and re-run the maths. If you've done Module 10, open a playground and put a small model head-to-head against a frontier one on a real task from your own work — same prompt, both models. If you built a Module 11 golden set, you have a personal benchmark: score the small model on it and let the number decide.",
      our_take: "Capability headlines get the attention; price collapses change behavior. Most people are still over-paying out of habit — using the biggest model for tasks a small one handles fine. The compounding skill isn't following releases; it's knowing your cost per completed task and re-checking it quarterly. Cheaper inference is the most under-rated news in AI, every single time it happens."
    }
  },
  {
    date: "2026-06-08",
    headline: "Agent frameworks converge on a shared standard for connecting tools",
    tldr: "Assistants from different vendors can increasingly plug into the same calendars, databases and apps — so describing the job well matters more than picking the platform.",
    tags: ["Agents", "Tools"],
    article: {
      what_happened: "The major agent frameworks and assistant products have been adopting a shared standard for how AI connects to external tools — calendars, databases, CRMs, file stores. Practically, it means a tool integration built once works across assistants from different vendors, the way any browser can open any website. Vendor-specific plugin systems are giving way to one common protocol.",
      why_it_matters: "This is the moment tool use (Module 4) stops being a per-platform science project. When every assistant can reach the same tools, the differentiator shifts from 'which platform did you bet on' to the things that were always going to matter: how clearly you describe the job, how well-scoped the agent's permissions are, and whether a human approves the consequential steps. Lock-in fear — a real reason companies stalled — just got weaker.",
      how_to_use: "If you've done the Module 9 build project, check whether your automation tool (n8n, Zapier, Make) exposes or consumes the standard — most now do. When you next evaluate an AI product, ask one question: 'what can it connect to, and what is it allowed to do there?' That answer now matters more than the model behind it. And keep guardrails non-negotiable: shared plumbing means prompt injection travels too.",
      our_take: "Standards moments look boring and change everything — this is AI's USB moment for tools. Our advice doesn't change, it strengthens: invest in the evergreen skills (describing workflows, scoping permissions, placing approval steps) rather than any vendor's flavor of the month. The plumbing is becoming universal; the judgment about what flows through it is still entirely yours."
    }
  },
  {
    date: "2026-06-05",
    headline: "Survey: most companies stuck at the pilot stage with AI projects",
    tldr: "A large industry survey finds the majority of corporate AI projects never leave the pilot phase — and the blockers are process and trust, not the technology.",
    tags: ["Business", "Adoption"],
    article: {
      what_happened: "A widely covered industry survey of enterprise AI programs found that most projects stall at the pilot stage: impressive demo, enthusiastic kickoff, then quiet death before company-wide rollout. The cited blockers are strikingly consistent — answers that can't be trusted on company-specific questions, no agreed way to measure quality, unclear ownership when AI output is wrong, and disorganized internal documents feeding the system.",
      why_it_matters: "Read that blocker list again: ungrounded answers (Module 3), no evals (Module 11), no governance rule about who owns output (Module 12), and poor data readiness (Module 12). Not one blocker is about the model. This is the deployment ladder from Module 6 in action — the gap between 'employees quietly use ChatGPT' and 'AI runs inside our workflows' is process and trust, and that gap is exactly where a person with fundamentals becomes valuable.",
      how_to_use: "If you're inside a company, pick the narrowest workflow you can find — one team, one document type, one output — and apply the Module 12 scoring: high-volume, text-heavy, error-tolerant first. Ground it in curated documents, define a 20-case eval before rollout, and name a human owner for every output. A pilot designed that way has an exit plan from day one, which is precisely what the stalled ones lack.",
      our_take: "The pilot graveyard isn't an indictment of AI; it's an indictment of skipping the unglamorous steps. Companies keep buying the engine and forgetting the road. Our honest read: the winners of the next two years won't be the ones with the best model access — everyone has that now — but the ones who cleaned their documents, wrote down what 'good' means, and put a name next to every output. None of that requires a single new release."
    }
  }
];

/* =====================================================================
   CURRICULUM
   ===================================================================== */
const MODULES = [
  {
    id: "m1",
    emoji: "🧠",
    title: "How AI actually works",
    desc: "Tokens, prediction, context windows, training vs inference",
    bridge: "So how do you talk to a brilliant guesser?",
    lessons: [
      {
        title: "A very good guesser",
        body: [
          "At its core, a large language model (LLM) does one thing: it predicts the next small chunk of text, called a <strong>token</strong>. A token is usually a word or piece of a word — \"unbelievable\" might be three tokens: un, believ, able. The model reads everything written so far and asks, \"given all of this, what token most likely comes next?\" Then it asks again. And again, thousands of times per answer.",
          "There is no database of answers inside. During <strong>training</strong>, the model read a huge slice of human writing and tuned billions of internal dials, called <strong>parameters</strong>, until its guesses got astonishingly good. Good prediction turns out to require something that looks a lot like understanding: to predict the end of a maths problem, you have to do the maths.",
          "This is why the same question can produce slightly different answers each time — the model is sampling from likely next tokens, not looking up a stored reply."
        ],
        analogy: "Think of your phone's autocomplete, but instead of learning from your last 1,000 texts, it learned from a meaningful fraction of everything humanity has ever written — and instead of suggesting one word, it can keep going until it has written an essay."
      },
      {
        title: "Training vs inference",
        body: [
          "AI has two completely separate phases, and mixing them up causes most confusion. <strong>Training</strong> is when the model learns: it processes mountains of text on thousands of GPUs for months, slowly adjusting its parameters. It is staggeringly expensive — often hundreds of millions of dollars — and it happens once, before you ever meet the model.",

/* =====================================================================
   GLOSSARY — every term used anywhere in the app.
   ===================================================================== */
const GLOSSARY = [
  ["Agent", "An AI model placed in a loop with a goal and access to tools, so it can take actions step by step (search, write, update systems) instead of just answering once."],
  ["AI coding assistant", "A tool (like Claude Code) where AI writes and edits real program code from plain-English instructions."],
  ["API (application programming interface)", "A structured way for programs to request services from each other. AI providers expose their models through APIs."],
  ["API key", "A secret code identifying your account to a service. All usage is billed against it — treat it like a credit card number."],
  ["Automation", "A fixed pipeline of steps that runs the same way every time, often with AI steps inside (e.g. when a form arrives → summarize → draft reply)."],
  ["Backend", "The behind-the-scenes part of an app that runs on a server: receives requests, applies logic, talks to databases and model APIs."],
  ["Chunk", "A small piece of a document (a few paragraphs) that RAG systems store and retrieve individually."],
  ["Closed model", "A model you can only use through its provider's app or API — you never get the model itself. Examples: GPT, Claude."],
  ["Context window", "The model's working memory: the total amount of text (in tokens) it can see and use at once. Anything outside it is invisible to the model."],
  ["Embedding", "A list of numbers representing the meaning of a piece of text, so 'similar meaning' becomes 'mathematically close'. The backbone of semantic search and RAG."],
  ["Few-shot prompting", "Improving results by including a few examples of the output you want directly in the prompt."],
  ["Fine-tuning", "Additional training on top of an existing model using your own examples, to specialize its behavior."],
  ["Frontend", "The part of an app users see and interact with — the screens, buttons and chat boxes."],
  ["Frontier model", "One of the most capable models available at a given time, usually large, closed and comparatively expensive."],
  ["Function calling", "Another name for tool use: the model outputs a structured request, and ordinary software executes it."],
  ["GPU", "Graphics processing unit — the chip type that does the heavy parallel math of training and running AI models."],
  ["Grounding", "Giving the model trusted source material (documents, data, search results) and instructing it to answer from that material rather than from memory."],
  ["Hallucination", "A confident-sounding answer that is false — invented facts, citations or numbers. A side effect of predicting plausible text."],
  ["Inference", "The phase where a trained model is actually used — generating answers. What happens every time you chat. Compare: training."],
  ["Knowledge cutoff", "The date a model's training data ends. The model knows nothing about events after it unless given the information in context."],
  ["LLM (large language model)", "An AI model trained on vast amounts of text to predict the next token — the technology behind ChatGPT, Claude and similar assistants."],
  ["Open-weight model", "A model whose weights can be downloaded and run on your own hardware, giving control and privacy in exchange for doing the operating yourself. Examples: Llama, Mistral."],
  ["Parameter", "One of the billions of internal numerical 'dials' inside a model, set during training, that determine its behavior."],
  ["Prompt", "Everything you give the model before it answers: instructions, context, examples, and the question itself."],
  ["Prototype", "An early, deliberately small version of a product built to test whether the idea works in reality."],
  ["RAG (retrieval-augmented generation)", "The standard pattern for AI over large document collections: retrieve the most relevant chunks for a question, put them in the context window, then generate a grounded answer."],
  ["Retrieval", "The step in RAG that finds the most relevant stored chunks for a given question, usually by comparing embeddings."],
  ["System prompt", "Standing instructions set by a product's developer that shape the model's behavior in every conversation, before the user types anything."],
  ["Token", "The small chunk of text models read and write — usually a word or piece of a word. Models predict one token at a time, and API usage is priced per token."],
  ["Tool use", "The mechanism letting a model request real actions (search, email, database queries): it emits a structured request and surrounding software runs it."],
  ["Training", "The expensive one-time phase where a model learns by processing huge datasets and adjusting its parameters. Compare: inference."],
  ["Trigger", "The event that starts an automation — a form submission, an incoming email, a schedule."],
  ["Vector database", "A database that stores embeddings and can rapidly find the entries closest in meaning to a query."],
  ["Weights", "The learned parameter values of a model — the file that 'is' the model. Sharing them publicly is what makes a model open-weight."],
  ["Workflow", "A defined sequence of steps that accomplishes a task — what you map out before building an automation."],
  ["XP (experience points)", "AIcademy's progress points: 10 per lesson page, 20 per correct quiz answer, 50 per foundation assignment, 150 per advanced build project. Every 200 XP is a level."],
  ["Build vs buy", "The strategic choice between purchasing a ready-made AI capability (best for commodity tasks) and building your own (best when it touches your differentiated data and workflows)."],
  ["Caching", "Reusing previously processed data instead of paying to process it again. Providers discount repeated prompt prefixes, making stable system prompts cheaper."],
  ["Chain-of-thought", "Prompting a model to reason step by step before giving its final answer — measurably better on maths, logic and planning tasks."],
  ["Champion (AI rollout)", "An employee already experimenting enthusiastically with AI, whose visible wins help an organization adopt it."],
  ["Chunking", "Splitting documents into pieces before storing them for retrieval. Chunk size and boundaries largely determine RAG quality."],
  ["Custom assistant", "A reusable AI assistant you configure yourself — a Custom GPT or Claude Project — with its own system prompt and knowledge files."],
  ["Data leakage", "Sensitive information placed into a model's context surfacing in its output. Prevented by scoping each request to only the data its user may see."],
  ["Data readiness", "How organized, current and de-duplicated your documents are — the prerequisite for grounded AI that works."],
  ["Eval", "A repeatable test for AI behavior: real test cases plus a scoring method, run on every prompt or model change to catch regressions."],
  ["Golden set", "The core of an eval: 20+ real input/expected-output pairs, including the hard and ambiguous cases."],
  ["Governance", "The written rules for AI use in an organization: what data may enter which tools, what needs human review, and who owns each output."],
  ["Guardrails", "Limits wrapped around an agent: permissions, tool allowlists, spending caps, sandboxes, approval steps."],
  ["Human-in-the-loop", "A design where the AI does the work but a person approves the consequential step — sending, paying, publishing — before it happens."],
  ["Hybrid search", "Running semantic (by meaning) and keyword (exact match) search together and merging results, covering each method's blind spots."],
  ["JSON", "A simple structured text format programs use to exchange data — the usual shape for AI output that feeds automations."],
  ["Key hygiene", "The habits that keep API keys safe: server-side only, never in public code, spending caps on, usage logs reviewed."],
  ["Latency", "How long a user waits for a response. Scales with tokens processed, so shorter prompts and outputs mean faster answers."],
  ["LLM-as-judge", "Using a second model to grade outputs against your rubric at scale — valid only after you verify it agrees with your own hand-graded scores."],
  ["Model routing", "Sending easy requests to small cheap models and hard ones to frontier models — often a tenfold cost reduction at equal quality."],
  ["Monitoring", "Logging production inputs, outputs and user feedback so failures are found early — and converted into new eval cases."],
  ["Multi-agent system", "Several specialist agents (researcher, writer, reviewer) with an orchestrator routing work between them. Powerful for genuinely divisible jobs; overhead for simple ones."],
  ["Orchestrator", "The component (or agent) that decides which specialist agent or step handles each part of a job."],
  ["Planning (agents)", "An agent drafting its steps before acting, then revising the plan when a step fails — instead of improvising every move."],
  ["Playground", "A provider's web console for composing raw API requests without code — the fastest way to learn what model, messages and temperature really do."],
  ["Prompt chaining", "Decomposing a big job into a sequence of prompts where each output feeds the next — more reliable and debuggable than one mega-prompt."],
  ["Prompt injection", "Malicious text placed in content an AI reads (a webpage, an email, user input) crafted to override its instructions. Defended by treating all input as untrusted and keeping permissions minimal."],
  ["Prompt template", "A reusable prompt with placeholders (like {{transcript}}) filled in per run — the bridge from chatting to building systems."],
  ["Reflection (agents)", "An agent reviewing its own output against the goal before declaring the job done."],
  ["Regression", "A change that fixes one case while silently breaking others. Invisible in AI systems unless you run evals."],
  ["Reranking", "Retrieving a generous candidate set cheaply, then having a sharper model re-score it and keep only the best chunks for the context window."],
  ["Rubric", "A written checklist defining what a good output looks like, used to score eval cases consistently."],
  ["Sandbox", "An isolated environment where an agent's actions can't affect real systems — mistakes stay contained."],
  ["Semantic search", "Finding text by closeness of meaning (via embeddings) rather than shared keywords."],
  ["Structured output", "Model output in a fixed machine-readable shape (JSON, tables) so other software can reliably use it."],
  ["Temperature", "The API setting controlling how predictable (low) or varied (high) the model's token sampling is."]
];

let profile = JSON.parse(localStorage.getItem(LS_PROFILE) || "null");
let S = JSON.parse(localStorage.getItem(LS_STATE) || "null") || {
  xp: 0, streak: 0, lastActive: null,
  lessons: {},     // "m1_0": true
  quizDone: {},    // "m1": score
  quizAwarded: {}, // "m1_2": true (XP given for this question)
  assignDone: {}   // "m1": true
};

function save(){ localStorage.setItem(LS_STATE, JSON.stringify(S)); if(profile) localStorage.setItem(LS_PROFILE, JSON.stringify(profile)); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function touchStreak(){
  const t = todayStr();
  if (S.lastActive === t){ if (S.streak < 1) S.streak = 1; return; }
  const y = new Date(); y.setDate(y.getDate()-1);
  const yStr = y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
  S.streak = (S.lastActive === yStr) ? S.streak + 1 : 1;
  S.lastActive = t;
}
function addXP(n){ touchStreak(); S.xp += n; save(); }
function displayStreak(){
  if (!S.lastActive) return 0;
  const t = todayStr();
  const y = new Date(); y.setDate(y.getDate()-1);
  const yStr = y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
  return (S.lastActive === t || S.lastActive === yStr) ? S.streak : 0;
}
function level(){ return Math.floor(S.xp / 200) + 1; }

/* ---- profile-driven ordering ---- */
function isBuilder(){
  if (!profile) return false;
  if (profile.level === "tried" || profile.level === "regular") return true;
  if (profile.level === "chat" && (profile.goal === "build" || profile.goal === "automate")) return true;
  return false;
}
function moduleOrder(){ return MODULES.map((_, i) => i); }
function isSkipReview(mi){ return isBuilder() && (mi === 0 || mi === 1); }
function spineText(){ return (profile && profile.spine) ? "<b>" + esc(profile.spine) + "</b>" : "your business or work"; }

/* ---- progress helpers ---- */
function lessonRead(mi, li){ return !!S.lessons[MODULES[mi].id + "_" + li]; }
function quizComplete(mi){ return S.quizDone[MODULES[mi].id] !== undefined; }
function assignComplete(mi){ return !!S.assignDone[MODULES[mi].id]; }
function moduleProgress(mi){
  let done = 0;
  for (let i=0;i<3;i++) if (lessonRead(mi,i)) done++;
  if (quizComplete(mi)) done++;
  if (assignComplete(mi)) done++;
  return done / 5;
}
function moduleComplete(mi){ return moduleProgress(mi) >= 1; }
function moduleUnlocked(mi){
  if (isSkipReview(mi)) return true;
  const order = moduleOrder();
  const pos = order.indexOf(mi);
  if (pos === 0) return true;
  // unlocked when the previous non-skip module in display order is complete
  for (let p = pos-1; p >= 0; p--){
    const prev = order[p];
    if (isSkipReview(prev)) continue;
    return moduleComplete(prev);
  }
  return true;
}

}

    options:[["habit","🌿 Daily habit — 15–20 min a day. One lesson + quiz daily; module projects spread across the week"],["weekend","🧱 Weekday nibbles + weekend build — 15 min on weekdays, one 60–90 min build session a week"],["serious","🔥 Serious — 45–60 min a day. Learn and build a little every single day"],["immersive","🚀 Immersive — 2+ hrs a day. Full sprint; Foundations done in under a week"]] },

  { key:"spine", q:"What's it called?", sub:"A name or short phrase. Every assignment will point at it.", type:"text", ph:"e.g. my bakery · growth at Acme · my travel blog" }
];
let obStep = 0, obAnswers = {};

function renderOnboarding(){
  const q = OB_QUESTIONS[obStep];
  const prog = OB_QUESTIONS.map((_,i)=>`<span class="${i<=obStep?"on":""}"></span>`).join("");
  let body;
  if (q.type === "text"){
    body = `<input type="text" id="ob-name" placeholder="${q.ph || "Type here"}" maxlength="60" autocomplete="off">
      <div style="height:16px"></div>
      <button class="btn btn-primary" id="ob-next" disabled>Continue</button>`;
  } else {
    body = q.options.map(o=>`<button class="choice pop" data-val="${o[0]}">${o[1]}</button>`).join("");
  }
  app.innerHTML = `<div class="ob-wrap">
    <div class="logo-line"><span class="mark">A</span>AIcademy</div>
    <div class="ob-progress">${prog}</div>
    <div class="screen no-tabs" style="padding:0;flex:none;">
      <div class="ob-q">${q.q}</div>
      <div class="ob-sub">${q.sub}</div>
      ${body}
    </div>
  </div>`;
  if (q.type === "text"){
    const inp = document.getElementById("ob-name"), btn = document.getElementById("ob-next");
    inp.focus();
    inp.oninput = () => btn.disabled = inp.value.trim().length === 0;
    inp.onkeydown = e => { if (e.key === "Enter" && inp.value.trim()) advance(inp.value.trim()); };
    btn.onclick = () => advance(inp.value.trim());
  } else {
    document.querySelectorAll(".choice").forEach((b,i) => {
      b.style.animationDelay = (i*0.05)+"s";
      b.onclick = () => { b.classList.add("selected"); setTimeout(()=>advance(b.dataset.val), 180); };
    });
  }
  function advance(val){
    obAnswers[q.key] = val;
    obStep++;
    if (obStep < OB_QUESTIONS.length) renderOnboarding();
    else {
      profile = obAnswers;
      save();
      renderWelcome();
    }
  }
}

function renderWelcome(){
  const builder = isBuilder();
  const startM = MODULES[builder ? 2 : 0];
  app.innerHTML = `<div class="ob-wrap"><div class="celebrate">
    <div class="big">🎉</div>
    <h2>You're in, ${esc(profile.name)}!</h2>
    <p>${builder
      ? "Since you've already built with AI, your path starts at <b>Module 3: " + startM.title + "</b>. Modules 1–2 sit above it on your path marked optional review — open them anytime."
      : "Your path starts at <b>Module 1: " + startM.title + "</b> — the foundation everything else builds on."}
    ${profile.spine ? " Everything you build along the way applies to <b>" + esc(profile.spine) + "</b> — by Module 12 it'll have an assistant, an automation, a shipped tool and a roadmap." : ""}
    <br><br>${({"habit":"Your rhythm: one lesson + quiz a day (15–20 min), with module projects paced across the week. Small daily reps are how this sticks","weekend":"Your rhythm: quick lessons on weekdays, and one real 60–90 min build session each weekend — that's when module projects happen","serious":"Your rhythm: 45–60 min a day — a lesson, a quiz, and steady project progress daily. Strong pace without burnout","immersive":"Full sprint: at 2+ hours a day you'll clear Foundations in under a week. Watch for fatigue — comprehension drops before enthusiasm does","5":"~5 minutes a day","15":"~15 minutes a day","30":"~30 minutes a day","fast":"2–3 hours a day — fast track"})[profile.minutes] || "Your pace, your call"}. There's no daily cap: each module unlocks the moment you finish the one before, all the way through the Advanced build projects. Every lesson, quiz and project earns XP. Don't break the streak. 🔥</p>
    <button class="btn btn-primary" id="go">Start learning</button>
  </div></div>`;
  document.getElementById("go").onclick = () => { currentTab = "home"; renderHome(); };
}

/* =====================================================================
   HOME — module path
   ===================================================================== */
const GOAL_LINE = {
  work: "Let's make AI second nature at work.",
  build: "Let's learn to build with AI.",
  automate: "Let's learn to hand off the busywork.",
  curious: "Let's make AI make sense."
};
function renderHome(){
  currentTab = "home";
  const order = moduleOrder();
  let startBadgeGiven = false;
  let prevSection = null;
  let nodes = "";
  order.forEach((mi, idx) => {
    const m = MODULES[mi];
    const unlocked = moduleUnlocked(mi);
    const done = moduleComplete(mi);
    const prog = moduleProgress(mi);
    const skip = isSkipReview(mi);
    const section = skip ? "Review · optional" : (m.tier === "advanced" ? "Advanced · Build projects" : "Foundations");
    if (section !== prevSection){
      nodes += `<div class="path-section"><span>${section}</span></div>`;
      prevSection = section;
    }
    let badge = "";
    if (done) badge = `<span class="badge done">Completed</span>`;
    else if (skip) badge = `<span class="badge skip">Review · optional</span>`;
    else if (unlocked && !startBadgeGiven){ badge = `<span class="badge start">Start here</span>`; startBadgeGiven = true; }
    else if (!unlocked) badge = `<span class="badge locked">Locked</span>`;
    nodes += `<div class="module-node rise ${idx % 2 === 0 ? "left" : "right"} ${done?"done":""}" style="animation-delay:${Math.min(idx,8)*0.06}s">
      <div class="mcard ${unlocked?"":"locked"}" data-mi="${mi}">
        ${done?`<div class="check-bub">✓</div>`:""}
        ${unlocked ? ringHTML(prog, m.emoji) : `<div class="ring-wrap"><div class="emoji"><span class="lock-ico">🔒</span></div></div>`}
        <div>
          <h3>${m.title}</h3>
          <p>${m.desc}</p>
          ${badge}${m.levelsUp ? ` <span class="badge lvl">${m.levelsUp}</span>` : ""}
          ${done && m.bridge ? `<p class="bridge">Next up: ${m.bridge}</p>` : ""}
        </div>
      </div>
    </div>`;
  });

  setScreen(`
    ${topbarHTML()}
    <div class="hello">Hey ${esc(profile.name)} 👋</div>
    <div class="hello-sub">${GOAL_LINE[profile.goal] || "Let's make AI make sense."}
      ${displayStreak() > 1 ? ` You're on a <b>${displayStreak()}-day streak</b> 🔥` : ""}</div>
    ${profile.spine ? `<div class="spine-line">🔨 Building: <b>${esc(profile.spine)}</b></div>` : ""}
    <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:22px;background:var(--surface);">
      <div style="font-size:26px;">🏅</div>
      <div style="flex:1;">
        <div style="font-weight:800;font-size:14px;margin-bottom:6px;">Level ${level()} · ${S.xp % 200}/200 XP to Level ${level()+1}</div>
        <div class="pbar"><div style="width:${(S.xp % 200)/2}%"></div></div>
      </div>
    </div>
    <div class="path">
      <div class="path-line"></div>
      ${nodes}
    </div>
  `);
  document.querySelectorAll(".mcard").forEach(c => {
    c.onclick = () => {
      const mi = +c.dataset.mi;
      if (moduleUnlocked(mi)) renderModule(mi);
    };
  });
}

/* =====================================================================
   MODULE DETAIL
   ===================================================================== */
function renderModule(mi){
  const m = MODULES[mi];
  const rows = m.lessons.map((l, li) => {
    const read = lessonRead(mi, li);
    return `<button class="item-row ${read?"complete":""}" data-act="lesson" data-li="${li}">
      <div class="ic">${read?"✓":"📄"}</div>
      <div><h4>Lesson ${li+1}: ${l.title}</h4><p>~2 min read</p></div>
      ${read?`<span class="tick">✓</span>`:`<span class="xp-tag">+10 XP</span>`}
    </button>`;
  }).join("");
  const qDone = quizComplete(mi);
  const aDone = assignComplete(mi);
  setScreen(`
    <button class="back-link" id="back">← Back to path</button>
    <div style="display:flex;align-items:center;gap:14px;margin:10px 0 4px;">
      ${ringHTML(moduleProgress(mi), m.emoji, 64)}
      <div>
        <h2 style="font-size:20px;font-weight:800;line-height:1.25;">${m.title}</h2>
        <p class="muted" style="font-weight:500;font-size:13.5px;">${m.desc}</p>
      </div>
    </div>
    ${isSkipReview(mi)?`<div class="soon-banner" style="margin-top:10px;">Optional review — skim it, skip it, or earn the XP. Your call.</div>`:""}
    <div class="section-title">Lessons</div>
    ${rows}
    <div class="section-title">Quiz</div>
    <button class="item-row ${qDone?"complete":""}" data-act="quiz">
      <div class="ic">${qDone?"✓":"❓"}</div>
      <div><h4>${m.title} — quiz</h4><p>6 questions + spaced review${qDone?` · best run: ${S.quizDone[m.id]}/6 correct`:""}</p></div>
      ${qDone?`<span class="tick">✓</span>`:`<span class="xp-tag">+20 XP / correct</span>`}
    </button>
    <div class="section-title">${m.tier === "advanced" ? "Build project" : "Assignment"}</div>
    <button class="item-row ${aDone?"complete":""}" data-act="assign">
      <div class="ic">${aDone?"✓":"🎯"}</div>
      <div><h4>${m.assignment.title}</h4><p>${m.tier === "advanced" ? "Build project · plan 2–3 focused hours" : "Hands-on, in your own ChatGPT or Claude"}</p></div>
      ${aDone?`<span class="tick">✓</span>`:`<span class="xp-tag">+${m.assignment.xp || 50} XP</span>`}
    </button>
  `);
  document.getElementById("back").onclick = renderHome;
  document.querySelectorAll(".item-row").forEach(r => {
    r.onclick = () => {
      const act = r.dataset.act;
      if (act === "lesson") renderLesson(mi, +r.dataset.li);
      else if (act === "quiz") startQuiz(mi);
      else renderAssignment(mi);
    };
  });
}

/* =====================================================================
   LESSON
   ===================================================================== */
function renderLesson(mi, li){
  const m = MODULES[mi], l = m.lessons[li];
  const dots = m.lessons.map((_,i)=>`<span class="${i<=li?"on":""}"></span>`).join("");
  const already = lessonRead(mi, li);
  const isLast = li === m.lessons.length - 1;
  setScreen(`
    <button class="back-link" id="back">← ${m.title}</button>
    <div class="dots" style="margin-top:10px;">${dots}</div>
    <div class="lesson-head">
      <h2>${l.title}</h2>
      <p>${m.emoji} ${m.title} · Lesson ${li+1} of ${m.lessons.length}</p>
    </div>
    <div class="lesson-body rise">
      <p>${l.body[0]}</p>
      <div class="analogy"><span class="tag">💡 Analogy</span>${l.analogy}</div>
      ${l.body.slice(1).map(p=>`<p>${p}</p>`).join("")}
    </div>
    <div style="height:10px"></div>
    <button class="btn btn-primary" id="done-btn">
      ${already ? (isLast ? "Back to module" : "Next lesson →") : (isLast ? "Finish · +10 XP" : "Continue · +10 XP")}
    </button>
  `);
  document.getElementById("back").onclick = () => renderModule(mi);
  document.getElementById("done-btn").onclick = () => {
    if (!already){
      S.lessons[m.id + "_" + li] = true;
      addXP(10);
    }
    if (isLast) renderModule(mi); else renderLesson(mi, li+1);
  };
}

/* =====================================================================
   QUIZ
   ===================================================================== */
let quizState = null;
function sampleReview(mi){
  // Up to 2 bonus questions drawn at random from earlier completed modules.
  const order = moduleOrder();
  const pool = [];
  order.slice(0, order.indexOf(mi)).forEach(pmi => {
    if (!moduleComplete(pmi)) return;
    MODULES[pmi].quiz.forEach((q, qi) => pool.push(Object.assign({}, q, { review: true, srcMi: pmi, srcQi: qi })));
  });
  const picks = [];
  while (pool.length && picks.length < 2){
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  return picks;
}
function startQuiz(mi){
  const base = MODULES[mi].quiz.map((q, qi) => Object.assign({}, q, { srcMi: mi, srcQi: qi }));
  quizState = { mi, qi: 0, correctBase: 0, correctReview: 0, earned: 0, questions: base.concat(sampleReview(mi)) };
  renderQuizQ();
}
function renderQuizQ(){
  const { mi, qi, questions } = quizState;
  const q = questions[qi];
  setScreen(`
    <button class="back-link" id="back">← Exit quiz</button>
    <div style="display:flex;align-items:center;gap:12px;margin:12px 0 18px;">
      <div class="pbar"><div style="width:${(qi/questions.length)*100}%"></div></div>
      <span style="font-weight:800;font-size:14px;color:var(--muted);flex:none;">${qi+1}/${questions.length}</span>
    </div>
    ${q.review ? `<span class="badge skip" style="display:inline-block;margin-bottom:10px;">Review · ${MODULES[q.srcMi].title}</span>` : ""}
    <div class="lesson-head"><h2 style="font-size:19px;">${q.q}</h2><p>${q.review ? "Bonus — spaced review from an earlier module" : "Pick one answer"}</p></div>
    <div id="choices">
      ${q.options.map((o,i)=>`<button class="choice pop" style="animation-delay:${i*0.05}s" data-i="${i}">${o}</button>`).join("")}
    </div>
    <div id="fb"></div>
  `, {});
  document.getElementById("back").onclick = () => renderModule(mi);
  document.querySelectorAll(".choice").forEach(b => b.onclick = () => answerQuiz(+b.dataset.i));
}
function answerQuiz(pick){
  const { qi, questions } = quizState;
  const q = questions[qi];
  const right = pick === q.a;
  const key = MODULES[q.srcMi].id + "_" + q.srcQi;
  let xpLine = "";
  if (right){
    if (q.review) quizState.correctReview++; else quizState.correctBase++;
    if (!S.quizAwarded[key]){
      S.quizAwarded[key] = true;
      addXP(20);
      quizState.earned += 20;
      xpLine = ` <span class="xp-float">+20 XP</span>`;
    } else { touchStreak(); save(); }
  } else { touchStreak(); save(); }
  document.querySelectorAll(".choice").forEach((b,i) => {
    b.disabled = true;
    if (i === q.a) b.classList.add("correct");
    else if (i === pick) b.classList.add("wrong");
  });
  document.getElementById("fb").innerHTML = `
    <div class="feedback ${right?"good":"bad"}">${right ? "Correct!" + xpLine : "Not quite — the highlighted answer is right."}</div>
    <button class="btn btn-primary" id="next">${qi === questions.length-1 ? "See results" : "Next question"}</button>`;
  document.getElementById("next").onclick = () => {
    quizState.qi++;
    if (quizState.qi < questions.length) renderQuizQ();
    else finishQuiz();
  };
}
function finishQuiz(){
  const { mi, correctBase, correctReview, earned, questions } = quizState;
  const m = MODULES[mi];
  const baseTotal = m.quiz.length;
  const reviewTotal = questions.length - baseTotal;
  const prev = S.quizDone[m.id];
  if (prev === undefined || correctBase > prev) S.quizDone[m.id] = correctBase;
  touchStreak(); save();
  const nowComplete = moduleComplete(mi);
  const allRight = correctBase + correctReview === questions.length;
  setScreen(`
    <div class="celebrate">
      <div class="big">${allRight ? "🏆" : correctBase >= 4 ? "🎉" : "💪"}</div>
      <h2>${correctBase}/${baseTotal} correct${reviewTotal ? ` · review ${correctReview}/${reviewTotal}` : ""}</h2>
      <p>${earned > 0 ? `You earned <b class="xp-float">+${earned} XP</b>. ` : ""}${allRight ? "Perfect run!" : correctBase >= 4 ? "Solid — review any misses in the lessons." : "Worth a re-read of the lessons, then try again. Retakes are free."}</p>
      ${nowComplete ? `<div class="soon-banner" style="background:#fff9e6;">🏅 Module complete — it's gold on your path now!</div>` : ""}
      <button class="btn btn-primary" id="cont">Continue</button>
      <div style="height:10px"></div>
      <button class="btn btn-ghost" id="retake">Retake quiz</button>
    </div>
  `);
  document.getElementById("cont").onclick = () => renderModule(mi);
  document.getElementById("retake").onclick = () => startQuiz(mi);
}

/* =====================================================================
   ASSIGNMENT
   ===================================================================== */
function renderAssignment(mi){
  const m = MODULES[mi];
  const done = assignComplete(mi);
  const xp = m.assignment.xp || 50;
  setScreen(`
    <button class="back-link" id="back">← ${m.title}</button>
    <div class="lesson-head" style="margin-top:10px;">
      <h2>🎯 ${m.assignment.title}</h2>
      <p>${m.tier === "advanced" ? "Build project · plan 2–3 focused hours · real tools, real output" : "Practical assignment · do this in your own ChatGPT or Claude account"}</p>
    </div>
    <div class="card rise" style="font-size:15.5px;line-height:1.65;">${m.assignment.steps.replace(/\{\{SPINE\}\}/g, spineText())}</div>
    <div style="height:18px"></div>
    ${done
      ? `<div class="feedback good" style="text-align:center;">✓ Marked done — nice work!</div>
         <button class="btn btn-ghost" id="undo">Mark as not done</button>`
      : `<button class="btn btn-primary" id="mark">I did it — mark done · +${xp} XP</button>
         <p class="muted" style="text-align:center;font-size:13px;margin-top:10px;font-weight:500;">Honor system. The XP only means something if you actually did it 😉</p>`}
  `);
  document.getElementById("back").onclick = () => renderModule(mi);
  if (done){
    document.getElementById("undo").onclick = () => { delete S.assignDone[m.id]; save(); renderAssignment(mi); };
  } else {
    document.getElementById("mark").onclick = () => {
      S.assignDone[m.id] = true;
      addXP(xp);
      renderAssignment(mi);
    };
  }
}

/* =====================================================================
   GLOSSARY
   ===================================================================== */
function renderGlossary(){
  currentTab = "glossary";
  setScreen(`
    ${topbarHTML()}
    <div class="section-title">📖 Glossary</div>
    <p class="muted" style="font-weight:500;font-size:14px;margin-bottom:14px;">Every term used in AIcademy, in plain language.</p>
    <input type="text" id="gl-search" placeholder="Search terms…" autocomplete="off">
    <div style="height:16px"></div>
    <div id="gl-list"></div>
  `);
  const list = document.getElementById("gl-list");
  function draw(filter){
    const f = (filter||"").toLowerCase();
    const items = GLOSSARY.slice().sort((a,b)=>a[0].localeCompare(b[0]))
      .filter(t => !f || t[0].toLowerCase().includes(f) || t[1].toLowerCase().includes(f));
    list.innerHTML = items.length
      ? items.map(t=>`<div class="card gl-term rise"><h4>${t[0]}</h4><p>${t[1]}</p></div>`).join("")
      : `<p class="muted" style="text-align:center;font-weight:500;padding:20px;">No matches for "${esc(filter)}"</p>`;
  }
  draw("");
  document.getElementById("gl-search").oninput = e => draw(e.target.value);
}
